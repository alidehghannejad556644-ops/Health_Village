<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>صفحه در دسترس نیست</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Vazirmatn',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
    color:white;
    position:relative;
}

/* پس زمینه */

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%,rgba(59,130,246,.25),transparent 35%),
    radial-gradient(circle at 80% 70%,rgba(16,185,129,.2),transparent 35%),
    radial-gradient(circle at 50% 100%,rgba(168,85,247,.18),transparent 40%);
    animation:move 12s linear infinite alternate;
}

@keyframes move{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.15);
    }

}

.card{

    position:relative;
    z-index:2;

    width:min(90%,700px);

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:25px;

    padding:60px 40px;

    text-align:center;

    box-shadow:0 25px 60px rgba(0,0,0,.4);

    animation:fade .8s ease;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.icon{

font-size:90px;
margin-bottom:20px;
animation:pulse 2s infinite;

}

@keyframes pulse{

0%,100%{transform:scale(1);}
50%{transform:scale(1.08);}

}

h1{

font-size:34px;
margin-bottom:20px;

}

p{

font-size:18px;
line-height:2;
opacity:.9;

}

.line{

width:90px;
height:4px;
margin:30px auto;
border-radius:10px;
background:linear-gradient(to left,#22c55e,#3b82f6);

}

.footer{

margin-top:35px;
font-size:14px;
opacity:.7;

}

</style>

</head>

<body>

<div class="card">

<div class="icon">🚫</div>

<h1>این صفحه دیگر در دسترس نیست</h1>

<div class="line"></div>

<p>
صفحه‌ای که به دنبال آن هستید حذف شده،
منتقل شده یا دیگر قابل دسترسی نیست.
<br><br>
در صورت نیاز، لطفاً با مدیر سایت یا پشتیبانی تماس بگیرید.
</p>

<div class="footer">
© تمامی حقوق محفوظ است.
</div>

</div>

</body>
</html>
